<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MicroChess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --bg2: #0e0e0e;
            --panel-bg: #111111;
            --panel-border: rgba(255,255,255,0.07);
            --text-color: #f0ece4;
            --text-muted: rgba(240,236,228,0.4);
            --board-gap: #1e1e1e;
            --cell-light: #272727;
            --cell-dark: #141414;
            --topbar-bg: #181818;
            --accent: #d4a832;
            --accent-glow: rgba(212,168,50,0.35);
            --accent-dim: rgba(212,168,50,0.15);
            --success: #2ecc71;
            --danger: #e74c3c;
            --white-p: #f4f0e8;
            --black-p: #101010;
            --white-glow: drop-shadow(0 0 8px rgba(82,162,225,0.85)) drop-shadow(0 3px 6px rgba(0,0,0,0.7));
            --black-glow: drop-shadow(0 0 9px rgba(165,105,210,0.95)) drop-shadow(0 3px 6px rgba(0,0,0,0.7));
        }

        body.theme-light {
            --bg: #ede4d6;
            --bg2: #e5daca;
            --panel-bg: #f4ede2;
            --panel-border: rgba(0,0,0,0.10);
            --text-color: #1a1206;
            --text-muted: rgba(26,18,6,0.4);
            --board-gap: #b8a48a;
            --cell-light: #d9c9ae;
            --cell-dark: #a08c70;
            --topbar-bg: #e8ddc8;
            --accent: #b06a10;
            --accent-glow: rgba(176,106,16,0.3);
            --accent-dim: rgba(176,106,16,0.12);
            --success: #22a85e;
            --danger: #c0392b;
            --white-p: #f8f4ee;
            --black-p: #0d0a06;
            --white-glow: drop-shadow(0 0 7px rgba(52,130,210,0.9)) drop-shadow(0 2px 4px rgba(0,0,0,0.35));
            --black-glow: drop-shadow(0 0 8px rgba(140,80,190,0.85)) drop-shadow(0 2px 4px rgba(0,0,0,0.25));
        }

        /* ── RESET & BASE ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cinzel', serif;
            background: var(--bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            transition: background 0.5s, color 0.5s;
            overflow-x: hidden;
        }

        /* Subtle vignette + radial light */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(212,168,50,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 100% 100% at 50% 110%, rgba(0,0,0,0.6) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body.theme-light::before {
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(176,106,16,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 100% 80% at 50% 110%, rgba(0,0,0,0.12) 0%, transparent 60%);
        }

        /* ── HOST ENTRY SCREEN ── */
        #host-entry-screen {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 50% 30%, #1c1600 0%, #000 100%);
            z-index: 5000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            text-align: center;
            color: white;
        }

        .entry-logo {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.8rem, 8vw, 2.8rem);
            color: var(--accent);
            letter-spacing: 8px;
            text-shadow: 0 0 40px rgba(212,168,50,0.5), 0 0 80px rgba(212,168,50,0.2);
            animation: title-glow 3s ease infinite alternate;
        }

        @keyframes title-glow {
            from { text-shadow: 0 0 30px rgba(212,168,50,0.4), 0 0 60px rgba(212,168,50,0.15); }
            to   { text-shadow: 0 0 50px rgba(212,168,50,0.7), 0 0 100px rgba(212,168,50,0.3); }
        }

        .entry-subtitle {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 5px;
            color: rgba(212,168,50,0.35);
            margin-top: 6px;
            text-transform: uppercase;
        }

        .entry-separator {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 36px auto;
            opacity: 0.4;
        }

        .entry-info {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        #link-display {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 18px;
            border-radius: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.55);
            margin: 14px 0 22px;
            width: 100%;
            max-width: 400px;
            word-break: break-all;
            line-height: 1.5;
        }

        .btn-large {
            padding: 14px 30px;
            background: var(--accent);
            color: #000;
            border: none;
            font-weight: 700;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: transform 0.15s, box-shadow 0.2s;
            width: 100%;
            max-width: 300px;
        }

        .btn-large:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        #await-p2 {
            color: #e67e22;
            margin-top: 48px;
            font-size: 0.7rem;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse-fade 1.8s ease infinite;
        }

        @keyframes pulse-fade {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── GAME AREA ── */
        #game-area {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
        }

        /* ── TOP BAR ── */
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
            background: var(--topbar-bg);
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid var(--panel-border);
            transition: background 0.4s, border-color 0.4s;
        }

        #opp-status {
            font-size: 10px;
            font-weight: 600;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        #opp-pts {
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--text-muted);
        }

        #phase-title {
            margin: 0;
            color: var(--accent);
            text-align: center;
            width: 100%;
            letter-spacing: 5px;
            font-size: 0.85rem;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .phase-title-pop {
            animation: phase-pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes phase-pop {
            0%   { transform: scale(2) translateY(-4px); opacity: 0; filter: blur(6px); letter-spacing: 12px; }
            60%  { opacity: 1; filter: blur(0); }
            80%  { transform: scale(0.97); }
            100% { transform: scale(1); letter-spacing: 5px; }
        }

        /* ── MAIN PANEL ── */
        .panel {
            background: var(--panel-bg);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.4s, border-color 0.4s;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        body.theme-light .panel {
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }

        /* ── BOARD ── */
        .board-container {
            position: relative;
            margin: 12px 0;
            width: 100%;
            aspect-ratio: 1 / 1;
            z-index: 1;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            background: var(--board-gap);
            border: 3px solid var(--board-gap);
            border-radius: 6px;
            overflow: hidden;
            width: 100%;
            height: 100%;
            gap: 1.5px;
            box-shadow:
                0 12px 48px rgba(0,0,0,0.5),
                inset 0 0 0 1px rgba(255,255,255,0.04),
                0 0 0 1px rgba(0,0,0,0.3);
            transition: border-color 0.4s, background 0.4s, box-shadow 0.6s;
        }

        body.theme-light .board {
            box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 0 0 1px rgba(0,0,0,0.08);
        }

        /* Board reveal bloom */
        .board.reveal-bloom {
            box-shadow:
                0 12px 48px rgba(0,0,0,0.5),
                inset 0 0 0 1px rgba(255,255,255,0.04),
                0 0 0 1px rgba(0,0,0,0.3),
                0 0 60px var(--accent-glow),
                0 0 120px var(--accent-dim);
            transition: box-shadow 0.1s ease;
        }

        .cell {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: background 0.15s, filter 0.15s;
        }

        .cell.light { background: var(--cell-light); }
        .cell.dark  { background: var(--cell-dark); }

        .cell:hover { filter: brightness(1.35); }

        .cell.highlight {
            background: rgba(46,204,113,0.35) !important;
            box-shadow: inset 0 0 14px rgba(46,204,113,0.5);
        }

        .cell.highlight::after {
            content: '';
            position: absolute;
            width: 28%;
            height: 28%;
            border-radius: 50%;
            background: rgba(46,204,113,0.65);
            box-shadow: 0 0 8px rgba(46,204,113,0.5);
        }

        .cell.planned {
            background: rgba(212,168,50,0.28) !important;
            box-shadow: inset 0 0 14px rgba(212,168,50,0.4);
        }

        /* ── PIECES LAYER ── */
        #pieces-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        .piece {
            position: absolute;
            width: 25%;
            height: 25%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11vw;
            /* LERP: spring easing on position, smooth on everything else */
            transition:
                left  0.45s cubic-bezier(0.34, 1.15, 0.64, 1),
                top   0.45s cubic-bezier(0.34, 1.15, 0.64, 1),
                transform  0.2s ease,
                opacity    0.25s ease,
                filter     0.25s ease;
            pointer-events: none;
            will-change: left, top;
        }

        @media (min-width: 450px) { .piece { font-size: 50px; } }

        .piece.white {
            color: var(--white-p);
            filter: var(--white-glow);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .piece.black {
            color: var(--black-p);
            filter: var(--black-glow);
        }

        .piece.ghost {
            opacity: 0.28;
            filter: grayscale(1) blur(0.5px) !important;
        }

        .piece.buffed {
            filter: drop-shadow(0 0 14px #d4a832) drop-shadow(0 0 7px #d4a832) !important;
        }

        .piece.selected {
            transform: scale(1.22) translateY(-6%);
            z-index: 20;
        }

        .piece.selected.white {
            filter: drop-shadow(0 0 14px rgba(82,162,225,1)) drop-shadow(0 5px 10px rgba(0,0,0,0.6)) !important;
        }

        .piece.selected.black {
            filter: drop-shadow(0 0 14px rgba(165,105,210,1)) drop-shadow(0 5px 10px rgba(0,0,0,0.6)) !important;
        }

        /* ── PIECE ENTRANCE ── */
        @keyframes piece-enter {
            0%   { transform: scale(0.25) translateY(-15%); opacity: 0; filter: brightness(4); }
            55%  { transform: scale(1.12) translateY(-2%); opacity: 1; }
            80%  { transform: scale(0.97) translateY(0); }
            100% { transform: scale(1)   translateY(0); }
        }

        .piece-entering {
            animation: piece-enter 0.42s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        /* ── PIECE CAPTURE ── */
        @keyframes piece-capture {
            0%   { transform: scale(1) rotate(0deg);     opacity: 1;   filter: brightness(1); }
            12%  { transform: scale(1.45) rotate(-9deg); opacity: 1;   filter: brightness(4) saturate(0.2); }
            28%  { transform: scale(0.85) rotate(6deg);  opacity: 0.85; }
            48%  { transform: scale(1.15) rotate(-4deg); opacity: 0.55; }
            70%  { transform: scale(0.55) rotate(10deg); opacity: 0.2; }
            100% { transform: scale(0)   rotate(22deg);  opacity: 0;   }
        }

        .piece-capturing {
            animation: piece-capture 0.62s cubic-bezier(0.4, 0, 0.2, 1) both;
            z-index: 30 !important;
            pointer-events: none;
        }

        /* ── SHOP / INVENTORY ── */
        .inventory-area { width: 100%; text-align: center; position: relative; }

        .shop-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            flex-wrap: wrap;
        }

        .shop-btns button {
            padding: 7px 11px;
            margin: 2px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            font-size: 1rem;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: -1px;
            transition: background 0.15s, border-color 0.15s, transform 0.12s;
        }

        .shop-btns button:hover:not(:disabled) {
            background: var(--accent-dim);
            border-color: rgba(212,168,50,0.45);
            transform: translateY(-1px);
        }

        body.theme-light .shop-btns button {
            background: rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.12);
        }

        body.theme-light .shop-btns button:hover:not(:disabled) {
            background: var(--accent-dim);
            border-color: rgba(176,106,16,0.4);
        }

        .shop-btns button:disabled { opacity: 0.18; cursor: not-allowed; }

        #btn-reset-draft {
            width: 34px; height: 34px;
            background: rgba(231,76,60,0.12);
            border: 1px solid rgba(231,76,60,0.25);
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            color: #e74c3c;
            font-size: 0.85rem;
            display: none;
            line-height: 1;
            padding: 0;
            transition: background 0.15s;
        }

        #btn-reset-draft:hover { background: rgba(231,76,60,0.3); }

        #my-budget {
            color: var(--accent);
            margin: 0 0 10px 0;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 3px;
        }

        .inv-piece {
            display: inline-flex;
            width: 44px; height: 44px;
            justify-content: center; align-items: center;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            text-align: center;
            cursor: pointer;
            margin: 3px;
            font-size: 24px;
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
        }

        body.theme-light .inv-piece { background: rgba(0,0,0,0.04); }

        .inv-piece:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .inv-piece.selected {
            border-color: var(--accent);
            transform: translateY(-3px) scale(1.08);
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .inv-piece.white { color: var(--white-p); filter: drop-shadow(0 0 3px rgba(82,162,225,0.5)); }
        .inv-piece.black { color: var(--black-p); filter: drop-shadow(0 0 3px rgba(165,105,210,0.5)); }

        /* ── READY BUTTON ── */
        .btn-ready {
            width: 100%;
            padding: 14px;
            background: var(--success);
            border: none;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 0.8rem;
            font-family: 'Cinzel', serif;
            color: #000;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: filter 0.15s, transform 0.15s, box-shadow 0.2s, background 0.3s, color 0.3s;
        }

        .btn-ready:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 5px 18px rgba(46,204,113,0.4);
        }

        .btn-ready:active:not(:disabled) { transform: translateY(0); }

        .btn-ready:disabled {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.18);
            cursor: not-allowed;
        }

        body.theme-light .btn-ready:disabled {
            background: rgba(0,0,0,0.08);
            color: rgba(0,0,0,0.22);
        }

        /* ── PHASE TRANSITION OVERLAY ── */
        #phase-overlay {
            position: fixed; inset: 0;
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            flex-direction: column;
            gap: 12px;
        }

        #phase-overlay .ov-bg {
            position: absolute; inset: 0;
            background: #000;
            animation: ov-bg-flash 0.9s ease both;
        }

        @keyframes ov-bg-flash {
            0%   { opacity: 0; }
            18%  { opacity: 0.92; }
            72%  { opacity: 0.92; }
            100% { opacity: 0; }
        }

        #phase-overlay .ov-content {
            position: relative; z-index: 1;
            text-align: center;
            animation: ov-content-slam 0.9s cubic-bezier(0.34, 1.2, 0.64, 1) both;
        }

        @keyframes ov-content-slam {
            0%   { opacity: 0; transform: scale(1.6) translateY(-8px); filter: blur(10px); }
            30%  { opacity: 1; filter: blur(0); }
            72%  { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.92); }
        }

        #phase-overlay .ov-label {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.8rem, 8vw, 2.6rem);
            color: var(--accent);
            letter-spacing: 8px;
            text-shadow: 0 0 30px var(--accent-glow);
        }

        #phase-overlay .ov-sub {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 6px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ── REVEAL FLASH (board bloom) ── */
        #reveal-flash {
            position: fixed; inset: 0;
            z-index: 1500;
            pointer-events: none;
            display: none;
        }

        #reveal-flash.active {
            display: block;
            animation: reveal-bloom 0.7s ease both;
        }

        @keyframes reveal-bloom {
            0%   { background: rgba(212,168,50,0); }
            25%  { background: rgba(212,168,50,0.22); }
            100% { background: rgba(212,168,50,0); }
        }

        body.theme-light #reveal-flash.active {
            animation: reveal-bloom-light 0.7s ease both;
        }

        @keyframes reveal-bloom-light {
            0%   { background: rgba(176,106,16,0); }
            25%  { background: rgba(176,106,16,0.18); }
            100% { background: rgba(176,106,16,0); }
        }

        /* ── DUEL MODAL ── */
        #duel-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.97);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        #duel-modal.modal-enter {
            animation: modal-fade-in 0.5s cubic-bezier(0.34, 1.1, 0.64, 1) both;
        }

        @keyframes modal-fade-in {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* Dramatic diagonal lines on duel bg */
        #duel-modal::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                -45deg,
                rgba(255,255,255,0.008) 0px,
                rgba(255,255,255,0.008) 1px,
                transparent 1px,
                transparent 20px
            );
            pointer-events: none;
        }

        #duel-status {
            letter-spacing: 7px;
            text-align: center;
            color: white;
            margin-top: 0;
            margin-bottom: 28px;
            font-size: 1.3rem;
            font-family: 'Cinzel Decorative', serif;
            text-shadow: 0 0 24px rgba(255,255,255,0.25);
            transition: color 0.3s;
            position: relative; z-index: 1;
        }

        .duel-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 320px;
            position: relative; z-index: 1;
        }

        .duel-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            transition: 0.3s;
            animation: card-in 0.4s cubic-bezier(0.34, 1.2, 0.64, 1) both;
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(12px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .duel-card.opp {
            border: 1px dashed rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.02);
            animation-delay: 0.06s;
        }

        .card-theme-white .duel-name-badge {
            background: rgba(82,162,225,0.12);
            color: #ddeeff;
            border: 1px solid rgba(82,162,225,0.3);
            padding: 7px 20px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.78rem;
            letter-spacing: 2px;
            margin-bottom: 14px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .card-theme-black .duel-name-badge {
            background: rgba(165,105,210,0.12);
            color: #e8d8f8;
            border: 1px solid rgba(165,105,210,0.3);
            padding: 7px 20px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.78rem;
            letter-spacing: 2px;
            margin-bottom: 14px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .dice-interactive {
            width: 88px; height: 88px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.18);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
            color: white;
            position: relative;
        }

        .card-theme-white .dice-interactive {
            border-color: rgba(82,162,225,0.5);
            box-shadow: 0 0 24px rgba(82,162,225,0.1), inset 0 0 20px rgba(82,162,225,0.05);
        }

        .card-theme-black .dice-interactive {
            border-color: rgba(165,105,210,0.5);
            box-shadow: 0 0 24px rgba(165,105,210,0.1), inset 0 0 20px rgba(165,105,210,0.05);
        }

        .duel-card.opp .dice-interactive { pointer-events: none; }

        .dice-interactive:hover:not(.duel-card.opp .dice-interactive) {
            transform: scale(1.06);
        }

        .dice-interactive:active { transform: scale(0.92); }

        .dice-interactive.winner-pulse {
            border-color: #d4a832 !important;
            box-shadow: 0 0 40px rgba(212,168,50,0.6), 0 0 80px rgba(212,168,50,0.25) !important;
            transform: scale(1.12);
            animation: winner-radiate 0.9s ease infinite alternate;
        }

        @keyframes winner-radiate {
            from { box-shadow: 0 0 30px rgba(212,168,50,0.5), 0 0 60px rgba(212,168,50,0.15); }
            to   { box-shadow: 0 0 55px rgba(212,168,50,0.85), 0 0 110px rgba(212,168,50,0.35); }
        }

        .dice-unicode {
            font-size: 64px;
            line-height: 1;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.25));
            transition: filter 0.2s;
        }

        .result-box {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 12px;
            width: 100%;
            animation: result-pop 0.45s cubic-bezier(0.34, 1.4, 0.64, 1) both;
        }

        @keyframes result-pop {
            from { opacity: 0; transform: scale(0.6); }
            to   { opacity: 1; transform: scale(1); }
        }

        .result-box.show { display: flex; }

        .result-total {
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            font-family: 'IBM Plex Mono', monospace;
            text-shadow: 0 0 24px var(--accent-glow);
        }

        .result-math {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.35);
            margin-top: 7px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 1px;
        }

        .opp-label {
            font-size: 0.62rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 3.5px;
            align-self: flex-start;
            margin-bottom: 6px;
            font-weight: 600;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
        }

        /* ── GAME OVER ── */
        #game-over-screen {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 50% 50%, #0c0a00 0%, #000 100%);
            z-index: 6000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            color: white;
            animation: go-in 0.9s ease both;
        }

        @keyframes go-in {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        #game-over-screen::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                -45deg,
                rgba(255,255,255,0.006) 0px,
                rgba(255,255,255,0.006) 1px,
                transparent 1px,
                transparent 24px
            );
            pointer-events: none;
        }

        #game-over-screen h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 0;
            position: relative; z-index: 1;
        }

        .go-divider {
            width: 48px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 20px auto;
            opacity: 0.5;
            position: relative; z-index: 1;
        }

        #game-over-result {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(2rem, 8vw, 3rem);
            margin: 0 0 52px 0;
            text-transform: uppercase;
            font-weight: 900;
            line-height: 1.15;
            animation: go-result 0.75s cubic-bezier(0.34, 1.3, 0.64, 1) 0.3s both;
            position: relative; z-index: 1;
        }

        @keyframes go-result {
            from { transform: scale(0.45); opacity: 0; filter: blur(10px); }
            to   { transform: scale(1);    opacity: 1; filter: blur(0); }
        }

        .win-text  { color: #2ecc71; text-shadow: 0 0 40px rgba(46,204,113,0.55); }
        .lose-text { color: #e74c3c; text-shadow: 0 0 40px rgba(231,76,60,0.55); }

        /* ── DUEL WAITING TEXT ── */
        .duel-waiting {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.2);
            margin-top: 10px;
            text-transform: uppercase;
            animation: pulse-fade 1.6s ease infinite;
        }

        /* ── GENERAL ANIMATIONS ── */
        @keyframes fadein {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- HOST ENTRY SCREEN -->
<div id="host-entry-screen">
    <div class="entry-logo">MICROCHESS</div>
    <div class="entry-subtitle">Sincronia &amp; Vácuo</div>
    <div class="entry-separator"></div>
    <p class="entry-info">Sala criada com sucesso!</p>
    <p style="font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:rgba(255,255,255,0.35); margin-top:6px;">Compartilhe o link com seu oponente</p>
    <div id="link-display">Obtendo link...</div>
    <button class="btn-large" onclick="copyLink()" id="btn-copy-main">COPIAR LINK</button>
    <p id="await-p2">Aguardando P2 se conectar...</p>
</div>

<!-- GAME OVER SCREEN -->
<div id="game-over-screen">
    <h1>Fim de Jogo</h1>
    <div class="go-divider"></div>
    <div id="game-over-result">RESULTADO</div>
    <button class="btn-large" onclick="playAgain()">JOGAR NOVAMENTE</button>
</div>

<!-- PHASE TRANSITION OVERLAY -->
<div id="phase-overlay">
    <div class="ov-bg"></div>
    <div class="ov-content">
        <div class="ov-label" id="ov-label-text">—</div>
        <div class="ov-sub" id="ov-label-sub"></div>
    </div>
</div>

<!-- REVEAL FLASH -->
<div id="reveal-flash"></div>

<!-- GAME AREA -->
<div id="game-area">
    <div id="top-bar">
        <div id="opp-status">Adversário: Conectando...</div>
        <div id="phase-title">CONECTANDO...</div>
        <div id="opp-pts">Pts: ?</div>
    </div>

    <div class="panel" id="my-panel">
        <div id="my-budget" style="color:var(--accent); margin:0 0 10px; font-weight:600; font-size:1rem; font-family:'IBM Plex Mono',monospace; letter-spacing:3px;">Meus Pts: 5</div>

        <div class="inventory-area">
            <div class="shop-wrapper">
                <div class="shop-btns" id="shop-btns-container"></div>
                <button id="btn-reset-draft" onclick="resetDraft()" title="Limpar">✕</button>
            </div>
            <div id="my-inv-stack" style="margin-top:10px;"></div>
        </div>

        <div class="board-container">
            <div class="board" id="main-board"></div>
            <div id="pieces-layer"></div>
        </div>

        <button id="btn-ready" class="btn-ready" onclick="setReady()">PRONTO</button>
    </div>
</div>

<!-- DUEL MODAL -->
<div id="duel-modal">
    <h1 id="duel-status">CONFLITO!</h1>
    <div class="duel-container" id="duel-container"></div>
    <button id="close-duel" class="btn-ready"
        style="max-width:300px; margin-top:28px; display:none; background:var(--accent); color:#000; position:relative; z-index:1;"
        onclick="finishDuel()">RESOLVER JOGADA</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAbhFyIevh5QmD7ccdF5kbHOcqsEdlhWUI",
        authDomain: "micro-chess-bcbc3.firebaseapp.com",
        projectId: "micro-chess-bcbc3",
        storageBucket: "micro-chess-bcbc3.firebasestorage.app",
        messagingSenderId: "757899553536",
        appId: "1:757899553536:web:5b365419c7c4f8f672a1e5",
        databaseURL: "https://micro-chess-bcbc3-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    let roomID = urlParams.get('sala');
    let myColor = 'white';
    let oppColor = 'black';
    let isHost = false;

    if (!roomID) {
        isHost = true;
        roomID = Math.random().toString(36).substring(2, 8);
        window.history.replaceState(null, '', `?sala=${roomID}`);
        document.getElementById('host-entry-screen').style.display = 'flex';
        document.getElementById('link-display').innerText = window.location.href;
    } else {
        myColor = 'black';
        oppColor = 'white';
        document.title = "MicroChess - P2 (Pretas)";
        document.body.classList.add('theme-light');
        document.getElementById('game-area').style.display = 'flex';
    }

    const gameRef = ref(db, `rooms/${roomID}`);

    window.copyLink = () => {
        navigator.clipboard.writeText(window.location.href);
        const btn = document.getElementById('btn-copy-main');
        if (btn) {
            btn.innerText = "COPIADO!";
            btn.style.background = "#2ecc71";
            setTimeout(() => { btn.innerText = "COPIAR LINK"; btn.style.background = ''; }, 2000);
        }
    };

    // ── ANIMATION STATE ──────────────────────────────────────────
    let localSelection = null;
    let rollInterval = null;
    let state = null;
    let isAdvancing = false;
    let localDiceAnimating = false;

    // Keyed piece rendering — persists between syncBoard() calls
    let pieceElements = new Map(); // pieceId → DOM element
    let prevPhase = null;
    let lastDuelKey = null;     // detects new duel in queue
    let revealBloomed = false;  // one-shot reveal board bloom

    const DICE_FACES = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
    const CONFIG = {
        'Q': { name: 'Rainha',  cost: 5, bonus: 5, icon: '♕' },
        'R': { name: 'Torre',   cost: 4, bonus: 4, icon: '♖' },
        'N': { name: 'Cavalo',  cost: 3, bonus: 3, icon: '♘' },
        'B': { name: 'Bispo',   cost: 2, bonus: 2, icon: '♗' },
        'P': { name: 'Peão',    cost: 1, bonus: 1, icon: '♙' },
        'K': { name: 'Rei',     cost: 0, bonus: 5, icon: '♔' }
    };

    const PHASE_LABELS = {
        DRAFT:    { label: 'Recrutamento',     sub: 'monte seu exército' },
        POSITION: { label: 'Posicionamento',   sub: 'coloque suas peças' },
        REVEAL:   { label: 'Revelação',        sub: 'o tabuleiro à mostra' },
        ACTION:   { label: 'Ação',             sub: 'planeje seu movimento' },
    };

    // ── PHASE TRANSITION ─────────────────────────────────────────
    function handlePhaseChange(newPhase) {
        if (prevPhase !== null && prevPhase !== newPhase) {
            triggerPhaseOverlay(newPhase);
            if (newPhase === 'REVEAL') triggerReveal();
            if (newPhase === 'ACTION') revealBloomed = false;
        }
        prevPhase = newPhase;
    }

    function triggerPhaseOverlay(phase) {
        if (phase === 'GAMEOVER') return;
        const overlay  = document.getElementById('phase-overlay');
        const labelEl  = document.getElementById('ov-label-text');
        const subEl    = document.getElementById('ov-label-sub');
        const info     = PHASE_LABELS[phase] || { label: phase, sub: '' };

        labelEl.innerText = info.label.toUpperCase();
        subEl.innerText   = info.sub.toUpperCase();

        overlay.style.display = 'flex';
        // Force reflow to restart animation
        const bg      = overlay.querySelector('.ov-bg');
        const content = overlay.querySelector('.ov-content');
        bg.style.animation      = 'none';
        content.style.animation = 'none';
        void bg.offsetWidth;
        bg.style.animation      = '';
        content.style.animation = '';

        setTimeout(() => { overlay.style.display = 'none'; }, 950);

        // Also animate the phase title text
        const titleEl = document.getElementById('phase-title');
        titleEl.classList.remove('phase-title-pop');
        void titleEl.offsetWidth;
        titleEl.classList.add('phase-title-pop');
        setTimeout(() => titleEl.classList.remove('phase-title-pop'), 700);
    }

    function triggerReveal() {
        if (revealBloomed) return;
        revealBloomed = true;

        // Flash overlay
        const flash = document.getElementById('reveal-flash');
        flash.style.display = 'block';
        flash.classList.remove('active');
        void flash.offsetWidth;
        flash.classList.add('active');
        setTimeout(() => { flash.style.display = 'none'; flash.classList.remove('active'); }, 800);

        // Board bloom
        const board = document.getElementById('main-board');
        board.classList.add('reveal-bloom');
        setTimeout(() => board.classList.remove('reveal-bloom'), 700);
    }

    // ── INIT ─────────────────────────────────────────────────────
    async function initGame() {
        if (myColor === 'white') {
            const snap = await get(gameRef);
            if (!snap.exists()) {
                await set(gameRef, {
                    phase: 'DRAFT', p2Connected: false,
                    budget: { white: 5, black: 5 },
                    army: [
                        { id: "wk1", type: 'K', x: 1, y: 0, color: 'white', bonus: 5, buffed: false },
                        { id: "bk1", type: 'K', x: 2, y: 3, color: 'black', bonus: 5, buffed: false }
                    ],
                    inventory: { white: [], black: [] },
                    ready: { white: false, black: false },
                    planning: { white: null, black: null },
                    duel: { active: false, pressed: { white: false, black: false }, rolls: { white: 0, black: 0 }, wPiece: null, bPiece: null, tx: 0, ty: 0, suddenDeath: false },
                    duelQueue: []
                });
            }
        } else {
            await update(gameRef, { p2Connected: true });
        }

        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            state = data;

            if (isHost && state.p2Connected && document.getElementById('host-entry-screen').style.display !== 'none') {
                document.getElementById('host-entry-screen').style.display = 'none';
                document.getElementById('game-area').style.display = 'flex';
            }

            // Defaults
            state.phase      = state.phase || 'DRAFT';
            state.army       = state.army || [];
            state.budget     = state.budget || { white: 5, black: 5 };
            state.inventory  = state.inventory || { white: [], black: [] };
            state.inventory.white = state.inventory.white || [];
            state.inventory.black = state.inventory.black || [];
            state.ready      = state.ready || { white: false, black: false };
            state.planning   = state.planning || { white: null, black: null };
            state.duel       = state.duel || { active: false };
            state.duel.pressed = state.duel.pressed || { white: false, black: false };
            state.duel.rolls   = state.duel.rolls   || { white: 0, black: 0 };
            state.duelQueue  = state.duelQueue || [];

            // Detect phase change BEFORE updateUI
            handlePhaseChange(state.phase);

            updateUI();

            if (myColor === 'white' && state.ready.white && state.ready.black && !isAdvancing && state.phase !== 'GAMEOVER') {
                isAdvancing = true;
                advanceHost().finally(() => { isAdvancing = false; });
            }
        });
    }

    // ── UPDATE UI ─────────────────────────────────────────────────
    function updateUI() {
        // GAME OVER
        if (state.phase === 'GAMEOVER') {
            const wk = state.army.find(p => p.type === 'K' && p.color === 'white');
            const bk = state.army.find(p => p.type === 'K' && p.color === 'black');
            const winnerColor = wk ? 'white' : (bk ? 'black' : 'draw');

            const goScreen = document.getElementById('game-over-screen');
            const goResult = document.getElementById('game-over-result');
            goScreen.style.display = 'flex';
            document.getElementById('duel-modal').style.display = 'none';

            if (winnerColor === myColor) {
                goResult.innerText = "Você Venceu!";
                goResult.className = "win-text";
            } else {
                goResult.innerText = "Você Perdeu!";
                goResult.className = "lose-text";
            }
            return;
        } else {
            document.getElementById('game-over-screen').style.display = 'none';
        }

        // Phase title
        const phaseMap = { REVEAL: 'REVELAÇÃO!', DRAFT: 'RECRUTAMENTO', POSITION: 'POSICIONAMENTO', ACTION: 'AÇÃO' };
        document.getElementById('phase-title').innerText = phaseMap[state.phase] || state.phase;

        // Opponent status
        const oppReady = state.ready[oppColor];
        if (state.phase === 'REVEAL') {
            document.getElementById('opp-status').innerText = "Revelando...";
            document.getElementById('opp-status').style.color = "var(--accent)";
        } else {
            document.getElementById('opp-status').innerText = oppReady ? "Oponente: PRONTO" : "Oponente: pensando...";
            document.getElementById('opp-status').style.color = oppReady ? "var(--success)" : "#e67e22";
        }
        document.getElementById('opp-pts').innerText = `Pts: ${state.budget[oppColor]}`;

        // Ready button
        const btnReady = document.getElementById('btn-ready');
        btnReady.disabled = state.ready[myColor] || state.phase === 'REVEAL';

        if (state.phase === 'REVEAL') {
            btnReady.innerText = "Preparando Ação...";
        } else if (state.ready[myColor]) {
            btnReady.innerText = "Aguardando Oponente...";
        } else {
            btnReady.innerText = "PRONTO";
        }

        document.getElementById('btn-reset-draft').style.display =
            (state.phase === 'DRAFT' && !state.ready[myColor]) ? 'block' : 'none';

        renderShopAndInventory();
        syncBoard();
        handleDuelUI();
    }

    // ── SHOP & INVENTORY ──────────────────────────────────────────
    function renderShopAndInventory() {
        const invStack     = document.getElementById('my-inv-stack');
        const shopContainer = document.getElementById('shop-btns-container');
        invStack.innerHTML = '';
        shopContainer.innerHTML = '';

        document.getElementById('my-budget').innerText = `Meus Pts: ${state.budget[myColor]}`;

        ['Q','R','N','B','P'].forEach(type => {
            const btn = document.createElement('button');
            btn.innerText = `${CONFIG[type].icon}(${CONFIG[type].cost})`;
            btn.disabled  = state.budget[myColor] < CONFIG[type].cost || state.phase !== 'DRAFT' || state.ready[myColor];
            btn.onclick   = () => buyPiece(type);
            shopContainer.appendChild(btn);
        });

        state.inventory[myColor].forEach((item, idx) => {
            const span = document.createElement('span');
            span.className = `inv-piece ${myColor}`;
            if (localSelection?.idx === idx && localSelection?.fromInv) span.classList.add('selected');
            span.innerText = CONFIG[item.type].icon;
            span.onclick = () => {
                if (state.phase === 'POSITION' && !state.ready[myColor]) {
                    if (localSelection?.idx === idx && localSelection?.fromInv) localSelection = null;
                    else localSelection = { ...item, idx, fromInv: true };
                    updateUI();
                }
            };
            invStack.appendChild(span);
        });
    }

    // ── SYNC BOARD (keyed piece rendering) ───────────────────────
    function syncBoard() {
        const boardEl = document.getElementById('main-board');
        const layerEl = document.getElementById('pieces-layer');

        // Rebuild cells (no animation needed for cells)
        boardEl.innerHTML = '';
        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 4; c++) {
                const logicalX = myColor === 'white' ? c : 3 - c;
                const logicalY = myColor === 'white' ? 3 - r : r;

                const cell = document.createElement('div');
                const isDark = ((logicalX + logicalY) % 2) === 0;
                cell.className = `cell ${isDark ? 'dark' : 'light'}`;

                if (state.phase !== 'REVEAL' && localSelection && !localSelection.fromInv && isValidMove(localSelection, logicalX, logicalY))
                    cell.classList.add('highlight');

                if (state.planning[myColor] && state.planning[myColor].tx === logicalX && state.planning[myColor].ty === logicalY)
                    cell.classList.add('planned');

                cell.onclick = () => handleCellClick(logicalX, logicalY);
                boardEl.appendChild(cell);
            }
        }

        // Determine which pieces to display
        const armyIds = new Set(state.army.map(p => p.id));

        const piecesToDraw = state.army.filter(p => {
            if (state.phase === 'POSITION' && p.color !== myColor && p.type !== 'K') return false;
            return true;
        });
        const displayedIds = new Set(piecesToDraw.map(p => p.id));

        // Handle removed / phase-hidden pieces
        pieceElements.forEach((el, id) => {
            if (el.classList.contains('piece-capturing')) return; // already animating out

            if (!armyIds.has(id)) {
                // Piece was captured → dramatic exit
                el.classList.add('piece-capturing');
                el.style.zIndex = '30';
                setTimeout(() => { el.remove(); pieceElements.delete(id); }, 680);

            } else if (!displayedIds.has(id)) {
                // Phase-hidden (opponent non-king in POSITION)
                el.style.opacity = '0';
                el.style.pointerEvents = 'none';
                el.style.transform = 'scale(0.4)';
            }
        });

        // Update or create displayed pieces
        let enteringIndex = 0;
        piecesToDraw.forEach(p => {
            if (pieceElements.get(p.id)?.classList.contains('piece-capturing')) return;

            const visualX = myColor === 'white' ? p.x : 3 - p.x;
            const visualY = myColor === 'white' ? 3 - p.y : p.y;

            let el = pieceElements.get(p.id);

            if (!el) {
                // New piece — create with entrance animation
                el = document.createElement('div');
                el.dataset.id = p.id;
                el.style.left = `${visualX * 25}%`;
                el.style.top  = `${visualY * 25}%`;
                layerEl.appendChild(el);
                pieceElements.set(p.id, el);

                const delay = enteringIndex * 75;
                enteringIndex++;
                setTimeout(() => {
                    el.classList.add('piece-entering');
                    setTimeout(() => el.classList.remove('piece-entering'), 500);
                }, delay);

            } else {
                // Restore from phase-hidden state
                if (el.style.opacity === '0') {
                    el.style.opacity = '';
                    el.style.pointerEvents = '';
                    el.style.transform = '';
                    el.classList.add('piece-entering');
                    setTimeout(() => el.classList.remove('piece-entering'), 500);
                }
                // LERP: update position, CSS transition handles the spring animation
                el.style.left = `${visualX * 25}%`;
                el.style.top  = `${visualY * 25}%`;
            }

            el.innerText = CONFIG[p.type].icon;

            // Reset classes, then apply current state
            el.className = `piece ${p.color}`;

            if (p.buffed) el.classList.add('buffed');

            if (localSelection && !localSelection.fromInv && localSelection.id === p.id && p.color === myColor)
                el.classList.add('selected');

            // Ghost: own planned piece
            if (state.planning[myColor] && state.planning[myColor].pieceId === p.id && p.color === myColor)
                el.classList.add('ghost');

            // Ghost: opponent planned piece in REVEAL
            if (state.phase === 'REVEAL') {
                const oppPlan = state.planning[oppColor];
                if (oppPlan && oppPlan.pieceId === p.id && p.color === oppColor)
                    el.classList.add('ghost');
            }
        });
    }

    // ── GAME ACTIONS ──────────────────────────────────────────────
    window.resetDraft = async () => {
        if (state.phase !== 'DRAFT' || state.ready[myColor]) return;
        localSelection = null;
        await update(gameRef, { [`budget/${myColor}`]: 5, [`inventory/${myColor}`]: [] });
    };

    window.buyPiece = async (type) => {
        if (state.budget[myColor] >= CONFIG[type].cost) {
            const newInv = [...(state.inventory[myColor] || [])];
            newInv.push({ type, color: myColor, id: `p_${Date.now()}` });
            await update(gameRef, {
                [`budget/${myColor}`]: state.budget[myColor] - CONFIG[type].cost,
                [`inventory/${myColor}`]: newInv
            });
        }
    };

    window.handleCellClick = async (logicalX, logicalY) => {
        if (state.ready[myColor] || state.phase === 'REVEAL') return;

        if (state.phase === 'POSITION') {
            const pAt = state.army.find(p => p.x === logicalX && p.y === logicalY);

            if (pAt && pAt.color === myColor && pAt.type !== 'K') {
                const newArmy = state.army.filter(a => a.id !== pAt.id);
                const newInv  = [...state.inventory[myColor]];
                newInv.push({ type: pAt.type, color: pAt.color, id: pAt.id });
                if (localSelection?.id === pAt.id) localSelection = null;
                await update(gameRef, { army: newArmy, [`inventory/${myColor}`]: newInv });
                return;
            }

            if (localSelection?.fromInv && !pAt &&
                ((myColor === 'white' && logicalY < 2) || (myColor === 'black' && logicalY > 1))) {
                const newArmy = [...state.army];
                newArmy.push({ id: localSelection.id, type: localSelection.type, color: myColor, x: logicalX, y: logicalY, bonus: CONFIG[localSelection.type].bonus, buffed: false });
                const newInv = [...state.inventory[myColor]];
                newInv.splice(localSelection.idx, 1);
                localSelection = null;
                await update(gameRef, { army: newArmy, [`inventory/${myColor}`]: newInv });
            }
        }
        else if (state.phase === 'ACTION') {
            const pAt = state.army.find(p => p.x === logicalX && p.y === logicalY);
            if (pAt?.color === myColor) {
                if (localSelection && localSelection.id === pAt.id) localSelection = null;
                else localSelection = pAt;
                updateUI();
            } else if (localSelection && isValidMove(localSelection, logicalX, logicalY)) {
                await update(ref(db, `rooms/${roomID}/planning/${myColor}`), {
                    pieceId: localSelection.id, tx: logicalX, ty: logicalY
                });
                localSelection = null;
            }
        }
    };

    window.setReady = async () => { await update(ref(db, `rooms/${roomID}/ready`), { [myColor]: true }); };

    // ── MOVEMENT VALIDATION ───────────────────────────────────────
    function isPathClear(p, tx, ty) {
        let dx = Math.sign(tx - p.x), dy = Math.sign(ty - p.y);
        let currX = p.x + dx, currY = p.y + dy, limit = 0;
        while ((currX !== tx || currY !== ty) && limit < 10) {
            if (state.army.some(a => a.x === currX && a.y === currY)) return false;
            currX += dx; currY += dy; limit++;
        }
        return true;
    }

    function isValidMove(p, tx, ty) {
        const dx = Math.abs(tx - p.x), dy = Math.abs(ty - p.y);
        if (dx === 0 && dy === 0) return false;

        const targetPiece = state.army.find(a => a.x === tx && a.y === ty);
        if (targetPiece && targetPiece.color === p.color) return false;

        let ok = false;
        switch (p.type) {
            case 'K': ok = (dx <= 1 && dy <= 1); break;
            case 'Q': ok = (dx === dy || dx === 0 || dy === 0); break;
            case 'R': ok = (dx === 0 || dy === 0); break;
            case 'B': ok = (dx === dy); break;
            case 'N': ok = ((dx === 1 && dy === 2) || (dx === 2 && dy === 1)); break;
            case 'P': {
                const isEnemy = targetPiece && targetPiece.color !== p.color;
                const fwd     = p.color === 'white' ? 1 : -1;
                const diffY   = ty - p.y;
                if (p.buffed) {
                    if (isEnemy  && dx === 1 && Math.abs(dy) === 1) ok = true;
                    if (!isEnemy && ((dx === 0 && Math.abs(dy) === 1) || (dx === 1 && dy === 0))) ok = true;
                } else {
                    if (isEnemy  && dx === 1 && diffY === fwd) ok = true;
                    if (!isEnemy && dx === 0 && Math.abs(dy) === 1) ok = true;
                }
                break;
            }
        }

        if (!ok) return false;
        if (['Q','R','B'].includes(p.type) && !isPathClear(p, tx, ty)) return false;
        return true;
    }

    // ── HOST ADVANCE ──────────────────────────────────────────────
    async function advanceHost() {
        let nextPhase = state.phase;

        if (state.phase === 'DRAFT')     nextPhase = 'POSITION';
        else if (state.phase === 'POSITION') {
            nextPhase = 'REVEAL';
            setTimeout(() => {
                isAdvancing = true;
                update(gameRef, { phase: 'ACTION', 'ready/white': false, 'ready/black': false })
                    .finally(() => { isAdvancing = false; });
            }, 3000);
        }
        else if (state.phase === 'REVEAL') { return; }
        else if (state.phase === 'ACTION') { await resolveActionHost(); return; }

        await update(gameRef, { phase: nextPhase, 'ready/white': false, 'ready/black': false });
        localSelection = null;
    }

    function checkFinalDuel(army) {
        return army.length === 2 && army[0].type === 'K' && army[1].type === 'K';
    }

    async function resolveActionHost() {
        const pW = state.planning.white, pB = state.planning.black;
        let army      = [...state.army];
        let duelQueue = [];

        const pieceW = pW ? army.find(p => p.id === pW.pieceId) : null;
        const pieceB = pB ? army.find(p => p.id === pB.pieceId) : null;

        let clashFrontal = false, swapClash = false;
        if (pW && pB && pW.tx === pB.tx && pW.ty === pB.ty) clashFrontal = true;
        if (pW && pB && pW.tx === pieceB.x && pW.ty === pieceB.y && pB.tx === pieceW.x && pB.ty === pieceW.y) swapClash = true;

        if (clashFrontal) {
            duelQueue.push({ type: 'frontal', wPiece: pieceW, bPiece: pieceB, txW: pW.tx, tyW: pW.ty, txB: pB.tx, tyB: pB.ty, priority: Math.max(pieceW.bonus, pieceB.bonus) });
        } else if (swapClash) {
            duelQueue.push({ type: 'swap', wPiece: pieceW, bPiece: pieceB, txW: pW.tx, tyW: pW.ty, txB: pB.tx, tyB: pB.ty, priority: Math.max(pieceW.bonus, pieceB.bonus) });
        } else {
            if (pW) {
                const targetBlack = army.find(p => p.x === pW.tx && p.y === pW.ty && p.color === 'black');
                if (targetBlack) duelQueue.push({ type: 'attack', attackerColor: 'white', wPiece: pieceW, bPiece: targetBlack, txW: pW.tx, tyW: pW.ty, txB: targetBlack.x, tyB: targetBlack.y, priority: pieceW.bonus });
                else { pieceW.x = pW.tx; pieceW.y = pW.ty; }
            }
            if (pB) {
                const targetWhite = army.find(p => p.x === pB.tx && p.y === pB.ty && p.color === 'white');
                if (targetWhite) duelQueue.push({ type: 'attack', attackerColor: 'black', wPiece: targetWhite, bPiece: pieceB, txW: targetWhite.x, tyW: targetWhite.y, txB: pB.tx, tyB: pB.ty, priority: pieceB.bonus });
                else { pieceB.x = pB.tx; pieceB.y = pB.ty; }
            }
        }

        duelQueue.sort((a, b) => b.priority - a.priority);

        army.forEach(p => {
            if (p.type === 'P' && !p.buffed) {
                if ((p.color === 'white' && p.y === 3) || (p.color === 'black' && p.y === 0)) {
                    p.buffed = true; p.bonus = 2;
                }
            }
        });

        let currentDuel = { active: false };
        let remainingQueue = [];

        if (duelQueue.length > 0) {
            const next = duelQueue[0];
            currentDuel = { ...next, active: true, resolveTime: false, suddenDeath: false, pressed: { white: false, black: false }, rolls: { white: 0, black: 0 } };
            remainingQueue = duelQueue.slice(1);
        } else if (checkFinalDuel(army)) {
            const kingW = army.find(k => k.color === 'white');
            const kingB = army.find(k => k.color === 'black');
            currentDuel = { active: true, resolveTime: false, wPiece: kingW, bPiece: kingB, suddenDeath: true, pressed: { white: false, black: false }, rolls: { white: 0, black: 0 } };
        }

        await update(gameRef, { army, planning: { white: null, black: null }, ready: { white: false, black: false }, duel: currentDuel, duelQueue: remainingQueue });
        localSelection = null;
    }

    // ── DUEL UI ───────────────────────────────────────────────────
    function buildDuelCard(isOpponent, pieceData, rollData, pressedState) {
        const themeClass = pieceData.color === 'white' ? 'card-theme-white' : 'card-theme-black';
        const nameText   = `${CONFIG[pieceData.type].name} +${pieceData.bonus}`;

        let diceContent  = '🎲';
        let resultHTML   = '';

        if (state.duel.resolveTime) {
            diceContent = DICE_FACES[rollData - 1];
            const total = rollData + pieceData.bonus;
            resultHTML  = `
                <div class="result-box show">
                    <div class="result-total">${total}</div>
                    <div class="result-math">Dado (${rollData}) + Bônus (${pieceData.bonus})</div>
                </div>`;
        } else if (pressedState) {
            diceContent = '⏳';
        }

        const clickAttr = (!isOpponent && !pressedState)
            ? `onclick="pressRoll('${pieceData.color}')"` : '';

        return `
            <div class="opp-label">${isOpponent ? 'OPONENTE' : 'VOCÊ'}</div>
            <div class="duel-card ${isOpponent ? 'opp' : ''} ${themeClass}">
                <div class="duel-name-badge">${nameText}</div>
                <div class="dice-interactive" id="dice-btn-${pieceData.color}" ${clickAttr}>
                    <div class="dice-unicode" id="dice-val-${pieceData.color}">${diceContent}</div>
                </div>
                ${resultHTML}
                ${(!pressedState && !isOpponent && !state.duel.resolveTime)
                    ? '<div class="duel-waiting">toque para rolar</div>' : ''}
            </div>`;
    }

    function handleDuelUI() {
        const modal = document.getElementById('duel-modal');
        const d     = state.duel;
        const container = document.getElementById('duel-container');

        if (!d || !d.active) {
            modal.style.display = 'none';
            if (rollInterval) { clearInterval(rollInterval); rollInterval = null; }
            localDiceAnimating = false;
            lastDuelKey = null;
            return;
        }

        // Detect new duel in queue → brief pause before showing
        const duelKey = `${d.wPiece?.id}_${d.bPiece?.id}`;
        if (modal.style.display === 'flex' && lastDuelKey !== null && lastDuelKey !== duelKey) {
            // Brief black-out between consecutive duels
            modal.style.display = 'none';
            setTimeout(() => {
                lastDuelKey = duelKey;
                modal.style.display = 'flex';
                modal.classList.remove('modal-enter');
                void modal.offsetWidth;
                modal.classList.add('modal-enter');
                renderDuelContent(modal, d, container);
            }, 550);
            return;
        }

        if (lastDuelKey !== duelKey) {
            lastDuelKey = duelKey;
            modal.style.display = 'flex';
            modal.classList.remove('modal-enter');
            void modal.offsetWidth;
            modal.classList.add('modal-enter');
        }

        renderDuelContent(modal, d, container);
    }

    function renderDuelContent(modal, d, container) {
        // Sudden death bg tint
        modal.style.background = d.suddenDeath
            ? 'radial-gradient(ellipse at 50% 50%, rgba(80,0,0,0.97) 0%, rgba(0,0,0,0.97) 100%)'
            : 'rgba(0,0,0,0.97)';

        const statusEl = document.getElementById('duel-status');
        statusEl.innerText = d.suddenDeath ? "MORTE SÚBITA!" : "CONFLITO!";
        statusEl.style.color = d.suddenDeath ? "#e74c3c" : "white";

        let html = '';
        if (myColor === 'white') {
            html += buildDuelCard(false, d.wPiece, d.rolls.white, d.pressed.white);
            html += buildDuelCard(true,  d.bPiece, d.rolls.black, d.pressed.black);
        } else {
            html += buildDuelCard(false, d.bPiece, d.rolls.black, d.pressed.black);
            html += buildDuelCard(true,  d.wPiece, d.rolls.white, d.pressed.white);
        }

        if (!localDiceAnimating && !d.resolveTime) {
            container.innerHTML = html;
        }

        // Sudden death: host auto-rolls
        if (d.suddenDeath && isHost && !d.pressed.white && !d.pressed.black) {
            setTimeout(() => {
                update(ref(db, `rooms/${roomID}/duel`), {
                    'pressed/white': true, 'pressed/black': true,
                    'rolls/white': Math.floor(Math.random() * 6) + 1,
                    'rolls/black': Math.floor(Math.random() * 6) + 1
                });
            }, 1000);
        }

        // Waiting animation for my roll
        if (d.pressed[myColor] && !d.pressed[oppColor] && !rollInterval) {
            rollInterval = setInterval(() => {
                const dVal = document.getElementById(`dice-val-${myColor}`);
                if (dVal) dVal.innerText = DICE_FACES[Math.floor(Math.random() * 6)];
            }, 90);
        }

        // Both pressed → animate both dice, then resolve
        if (d.pressed.white && d.pressed.black && !d.resolveTime) {
            localDiceAnimating = true;
            if (rollInterval) { clearInterval(rollInterval); rollInterval = null; }

            if (!window.localSincInterval) {
                window.localSincInterval = setInterval(() => {
                    const vW = document.getElementById('dice-val-white');
                    const vB = document.getElementById('dice-val-black');
                    if (vW) vW.innerText = DICE_FACES[Math.floor(Math.random() * 6)];
                    if (vB) vB.innerText = DICE_FACES[Math.floor(Math.random() * 6)];
                }, 85);

                if (myColor === 'white') {
                    setTimeout(() => { update(ref(db, `rooms/${roomID}/duel`), { resolveTime: true }); }, 2000);
                }
            }
            return;
        }

        // Show result
        if (d.resolveTime) {
            if (window.localSincInterval) { clearInterval(window.localSincInterval); window.localSincInterval = null; }
            localDiceAnimating = false;

            container.innerHTML = html;

            const totW = d.rolls.white + d.wPiece.bonus;
            const totB = d.rolls.black + d.bPiece.bonus;

            if (totW > totB) {
                statusEl.innerText = "BRANCO VENCE!";
                document.getElementById('dice-btn-white')?.classList.add('winner-pulse');
            } else if (totB > totW) {
                statusEl.innerText = "PRETO VENCE!";
                document.getElementById('dice-btn-black')?.classList.add('winner-pulse');
            } else {
                statusEl.innerText = "EMPATE!";
            }

            document.getElementById('close-duel').style.display = 'block';
        } else {
            document.getElementById('close-duel').style.display = 'none';
        }
    }

    window.pressRoll = async (colorClicked) => {
        if (colorClicked !== myColor || localDiceAnimating) return;
        const roll = Math.floor(Math.random() * 6) + 1;
        await update(ref(db, `rooms/${roomID}/duel`), {
            [`pressed/${myColor}`]: true,
            [`rolls/${myColor}`]: roll
        });
    };

    window.finishDuel = async () => {
        const d = state.duel;
        if (!d || !d.resolveTime) return;
        if (window.localSincInterval) { clearInterval(window.localSincInterval); window.localSincInterval = null; }

        if (myColor === 'black') {
            document.getElementById('duel-modal').style.display = 'none';
            return;
        }

        let army  = [...state.army];
        const totW = d.rolls.white + d.wPiece.bonus;
        const totB = d.rolls.black + d.bPiece.bonus;
        const idxW = army.findIndex(a => a.id === d.wPiece.id);
        const idxB = army.findIndex(a => a.id === d.bPiece.id);

        if (totW > totB) {
            if (idxB > -1) army.splice(idxB, 1);
            const wAlive = army.find(a => a.id === d.wPiece.id);
            if (wAlive && (d.type === 'frontal' || d.type === 'swap' || d.attackerColor === 'white')) {
                wAlive.x = d.txW; wAlive.y = d.tyW;
            }
        } else if (totB > totW) {
            if (idxW > -1) army.splice(idxW, 1);
            const bAlive = army.find(a => a.id === d.bPiece.id);
            if (bAlive && (d.type === 'frontal' || d.type === 'swap' || d.attackerColor === 'black')) {
                bAlive.x = d.txB; bAlive.y = d.tyB;
            }
        } else {
            army = army.filter(a => a.id !== d.wPiece.id && a.id !== d.bPiece.id);
        }

        const wk = army.find(p => p.type === 'K' && p.color === 'white');
        const bk = army.find(p => p.type === 'K' && p.color === 'black');
        if (!wk || !bk) {
            await update(gameRef, { army, duel: { active: false }, duelQueue: [], phase: 'GAMEOVER' });
            return;
        }

        let queue = state.duelQueue || [];
        while (queue.length > 0) {
            const nextDuel   = queue.shift();
            const stillHasW  = army.find(a => a.id === nextDuel.wPiece.id);
            const stillHasB  = army.find(a => a.id === nextDuel.bPiece.id);
            let duelValid    = false;

            if (stillHasW && stillHasB) {
                if (nextDuel.type === 'frontal' || nextDuel.type === 'swap') duelValid = true;
                else if (nextDuel.type === 'attack') {
                    if (nextDuel.attackerColor === 'white' && stillHasB.x === nextDuel.txB && stillHasB.y === nextDuel.tyB) duelValid = true;
                    if (nextDuel.attackerColor === 'black' && stillHasW.x === nextDuel.txW && stillHasW.y === nextDuel.tyW) duelValid = true;
                }
            }

            if (duelValid) {
                const nextActiveDuel = { ...nextDuel, active: true, resolveTime: false, wPiece: stillHasW, bPiece: stillHasB, pressed: { white: false, black: false }, rolls: { white: 0, black: 0 } };
                await update(gameRef, { army, duel: nextActiveDuel, duelQueue: queue });
                return;
            } else {
                if (stillHasW && nextDuel.type === 'attack' && nextDuel.attackerColor === 'white') { stillHasW.x = nextDuel.txW; stillHasW.y = nextDuel.tyW; }
                if (stillHasB && nextDuel.type === 'attack' && nextDuel.attackerColor === 'black') { stillHasB.x = nextDuel.txB; stillHasB.y = nextDuel.tyB; }
            }
        }

        if (checkFinalDuel(army)) {
            const kingW = army.find(k => k.color === 'white');
            const kingB = army.find(k => k.color === 'black');
            const suddenDeathDuel = { active: true, resolveTime: false, wPiece: kingW, bPiece: kingB, suddenDeath: true, pressed: { white: false, black: false }, rolls: { white: 0, black: 0 } };
            await update(gameRef, { army, duel: suddenDeathDuel, duelQueue: [] });
            return;
        }

        await update(gameRef, { army, duel: { active: false }, duelQueue: [], phase: 'ACTION' });
    };

    // ── PLAY AGAIN ────────────────────────────────────────────────
    window.playAgain = async () => {
        if (state.phase !== 'GAMEOVER') return;

        // Clear all piece DOM elements before reset
        pieceElements.forEach(el => el.remove());
        pieceElements.clear();
        prevPhase  = null;
        lastDuelKey = null;

        await set(gameRef, {
            phase: 'DRAFT', p2Connected: true,
            budget: { white: 5, black: 5 },
            army: [
                { id: "wk1", type: 'K', x: 1, y: 0, color: 'white', bonus: 5, buffed: false },
                { id: "bk1", type: 'K', x: 2, y: 3, color: 'black', bonus: 5, buffed: false }
            ],
            inventory: { white: [], black: [] },
            ready: { white: false, black: false },
            planning: { white: null, black: null },
            duel: { active: false, pressed: { white: false, black: false }, rolls: { white: 0, black: 0 }, wPiece: null, bPiece: null, tx: 0, ty: 0, suddenDeath: false },
            duelQueue: []
        });
    };

    initGame();
</script>
